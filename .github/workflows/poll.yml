# Scheduling has moved to the Raspberry Pi via Docker Compose.
# This workflow is intentionally disabled (no schedule trigger).
# It can be triggered manually from the GitHub Actions UI for one-off runs
# if needed, but the Pi is the primary runner.
#
# To re-enable: add the schedule block back and set up DATABASE_URL as a
# GitHub Actions secret pointing to an accessible PostgreSQL instance.

name: AMC IMAX Showtime Poller (disabled)

on:
  workflow_dispatch:

jobs:
  poll:
    name: Poll IMAX showtimes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r AMC/requirements.txt

      - name: Run single poll
        env:
          AMC_API_KEY:        ${{ secrets.AMC_API_KEY }}
          THEATRE_NUMBER:     ${{ vars.THEATRE_NUMBER }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
        run: python AMC/main.py --once
