services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — shared database for all bots
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       movies
      POSTGRES_USER:     movies
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Any .sql file here runs once on a fresh DB (schema init)
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movies -d movies"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      # Expose locally so you can inspect with TablePlus / pgAdmin / psql
      - "5432:5432"

  # ---------------------------------------------------------------------------
  # Nitehawk Cinema scraper
  # ---------------------------------------------------------------------------
  nitehawk:
    build: ./Nitehawk
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://movies:${POSTGRES_PASSWORD}@postgres:5432/movies
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Metrograph NYC scraper
  # ---------------------------------------------------------------------------
  metrograph:
    build: ./Metrograph
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://movies:${POSTGRES_PASSWORD}@postgres:5432/movies
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # AMC IMAX bot
  # ---------------------------------------------------------------------------
  amc:
    build: ./AMC
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://movies:${POSTGRES_PASSWORD}@postgres:5432/movies
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Angelika Film Center scraper (NYC, Mosaic, Dallas)
  # ---------------------------------------------------------------------------
  angelika:
    build: ./Angelika
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://movies:${POSTGRES_PASSWORD}@postgres:5432/movies
    depends_on:
      postgres:
        condition: service_healthy

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres-data:    # persists all bot data across container restarts / rebuilds
